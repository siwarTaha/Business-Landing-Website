<!DOCTYPE html>

<html lang="en">
    
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Welcome back to Kochi Solutions. Access your account to continue your journey. Secure, simple, and seamless.">
        <title>Login To Kochi Solutions</title>
        <link rel="stylesheet" href="../css/global.css">
        <link rel="stylesheet" href="../css/signform.css">

        </head>
     <body>
        <header>
            <div class="header">
                <div class="brand-name">
                    <a href="../index.html">KOCHI</a>
                </div>

                <nav class="nav-bar">
                    <ul>
                        <li><a href="../index.html"><b>Home</b></a></li>
                        <li><a href="/pages/about.html">About</a></li>
                        <li><a href="/pages/services.html">Services</a></li>
                        <li><a href="/pages/contact.html">Contact</a></li>
                    </ul>
                </nav>
            </div>

            <div class="top-bar">
                <div>
                <h1>Sign In for your Kochi Account</h1>
                </div>
            </div>
        </header>

        <main>
            <div class="form-container">
                <form method="post" class="form">
                    <label class="form-label" for="username">Enter Username</label>
                    <input class="form-input" id="username" name="username" type="text" minlength="5" maxlength="20" required placeholder="USERNAME">

                    <label class="form-label" for="password">Password</label>
                    <input class="form-input" id="password" name="password" type="password" minlength="8" maxlength="20" required placeholder="*****************">

                    <button class="form-button" type="submit">Sign in</button>
                    <button class="reset-btn" type="reset">Reset</button>

                    <p class="form-p">Don't have an account? <a class="form-a" href="/pages/signup.html">Sign up!</a></p> 
                </form>
            </div>
        </main>

        <footer>
            <p>Copyright Kochi Inc. 2024. Developed by Eric Kovalevskyy.</p>
        </footer>
        
    </body>


</html>
