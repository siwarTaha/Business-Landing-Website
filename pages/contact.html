<!DOCTYPE html>

<html lang="en">
    
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Have questions or need assistance? Our team is ready to support you. Reach out — we’d love to hear from you.">
        <title>Contact Kochi Solutions</title>
        <link rel="stylesheet" href="../css/global.css">
        <link rel="stylesheet" href="../css/contact.css">

        </head>
     <body>
        <header>
            <div class="header">
                <div class="brand-name">
                    <a href="../index.html">KOCHI</a>
                </div>

                <nav class="nav-bar">
                    <ul>
                        <li><a href="../index.html"><b>Home</b></a></li>
                        <li><a href="/pages/about.html">About</a></li>
                        <li><a href="/pages/services.html">Services</a></li>
                        <li><a href="/pages/contact.html">Contact</a></li>
                    </ul>
                </nav>
            </div>

            <div class="top-bar">
                <div>
                <h1>Contact Us</h1>
                </div>
            </div>
        </header>

        <main class="contact-page">

            <section class="contact-container">
                <div class="contact">
                    <h2 class="contact-header2">Contact Details</h2>
                    <p>contact@kochi.com <br>(555) 555-5555</p>
                    <h3 class="contact-header3">Central HQ</h3>
                    <address>123 Avenue Street <br>City Township, CA 12345</address>
                </div>
            </section>

            <section class="form-container">
                <h2 class="contact">Online Inquiry</h2>
                <form method="post" class="form">
                    <label class="form-label" for="name">Name</label>
                    <input class="form-input" id="name" name="name" type="text" minlength="2" maxlength="20" required placeholder="e.g John Smith">

                    <label class="form-label" for="email">Email</label>
                    <input class="form-input" id="email" name="email" type="email" required placeholder="e.g. name@domain.ltd">

                    <label class="form-label" for="message">Message</label>
                    <textarea class="form-textarea" id="message" name="message" rows="10" minlength="20" maxlength="500" required placeholder="Type your message here (between 20 and 500 characters)"></textarea>

                    <button class="form-button" type="submit">Submit</button>
                    <button class="reset-btn" type="reset">Reset</button>

                </form>
            </section>
            
        </main>

        <footer>
            <p>Copyright Kochi Inc. 2024. Developed by Eric Kovalevskyy.</p>
        </footer>
        
    </body>


</html>
