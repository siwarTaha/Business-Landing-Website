<!DOCTYPE html>

<html lang="en">
    
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Join Kochi and unlock new opportunities for growth. Create your account and become part of our community. Your journey starts here.">
        <title>Create Your Kochi Solutions Account</title>
        <link rel="stylesheet" href="../css/global.css">
        <link rel="stylesheet" href="../css/signform.css">

        </head>
     <body>
        <header>
            <div class="header">
                <div class="brand-name">
                    <a href="../index.html">KOCHI</a>
                </div>

                <nav class="nav-bar">
                    <ul>
                        <li><a href="../index.html"><b>Home</b></a></li>
                        <li><a href="/pages/about.html">About</a></li>
                        <li><a href="/pages/services.html">Services</a></li>
                        <li><a href="/pages/contact.html">Contact</a></li>
                    </ul>
                </nav>
            </div>

            <div class="top-bar">
                <div>
                <h1>Sign Up for a Kochi Account</h1>
                </div>
            </div>
        </header>

        <main>
            <div class="form-container">
                <form method="post" class="form">
                    <label class="form-label" for="username">Enter Username</label>
                    <input class="form-input" id="username" name="username" type="text" minlength="5" maxlength="20" required placeholder="USERNAME">

                    <label class="form-label" for="phone-number">Phone</label>
                    <input class="form-input" id="phone-number" name="phone-number" type="tel" minlength="9" maxlength="15" pattern="[0-9]+" required placeholder="EX. 555-555-555">

                    <label class="form-label" for="email">Email</label>
                    <input class="form-input" id="email" name="email" type="email" required placeholder="email@domain">

                    <label class="form-label" for="password">Password</label>
                    <input class="form-input" id="password" name="password" type="password" minlength="8" maxlength="20" required placeholder="*****************">

                    <button class="form-button" type="submit">Register</button>
                    <p class="form-p">Already have an account? <a class="form-a" href="/pages/login.html">Sign in!</a></p> 
                </form>
            </div>
        </main>

        <footer>
            <p>Copyright Kochi Inc. 2024. Developed by Eric Kovalevskyy.</p>
        </footer>
        
    </body>


</html>
